backend:
  name: git-gateway
  branch: main

# This is where the CMS will save the actual files
media_folder: "images/uploads"

# IMPORTANT: This is the path the website uses to display the image
# Adding the leading slash ensures it works from any page (like /blog or /admin)
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "posts" # This will create a 'posts' folder in your GitHub
    create: true
    extension: "md" # Changed to Markdown for cleaner data
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Business Solutions", "Inventory Update", "Maintenance Tips"], default: "Business Solutions" }
      - { label: "Featured Image", name: "thumbnail", widget: "image" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
