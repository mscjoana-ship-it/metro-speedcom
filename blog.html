<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Blog | Metro Speedcom Corporation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white border-b py-4 px-6 flex justify-between items-center shadow-sm">
        <a href="/" class="flex items-center gap-2">
            <img src="logo.PNG" alt="Logo" class="h-10">
            <span class="font-bold text-slate-800">METRO SPEEDCOM</span>
        </a>
        <a href="/" class="text-blue-700 font-semibold">← Home</a>
    </nav>

    <header class="py-16 bg-slate-900 text-white text-center">
        <h1 class="text-4xl font-bold mb-4">Latest Insights & Updates</h1>
        <p class="text-slate-400">Trusted IT and Copier Solutions for BPOs and PEZA Locators.</p>
    </header>

    <main class="max-w-6xl mx-auto py-12 px-6">
        <div id="posts-container" class="grid md:grid-cols-1 gap-8">
            </div>
    </main>
    
    <footer class="bg-slate-900 text-slate-400 py-12 text-center border-t border-slate-800">
        <p class="mb-2 text-white font-bold uppercase tracking-widest">Metro Speedcom Corporation</p>
        <p>&copy; 2026. All rights reserved.</p>
    </footer>

    <script>
        // THIS IS YOUR POST DATABASE
        // To add a new post, just copy the { ... } block and paste a new one above it!
        const blogPosts = [
            {
                title: "Reliable Copier Rental Services for Businesses in Metro Manila & PEZA Zones",
                date: "March 11, 2026",
                category: "Business Solutions",
                // This path points directly to your uploaded image
                image: "/images/uploads/copier-rental-metro-manila-office-printing-free-demo.jpg.jpg",
                description: "Looking for cost-effective office printing? Metro Speedcom offers premium Kyocera and Samsung copier rentals with fixed monthly rates and reliable technical support during office hours for BPOs and Corporate offices."
            }
        ];

        function displayPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = blogPosts.map(post => `
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row hover:shadow-lg transition-all duration-300">
                    <div class="md:w-1/3">
                        <img src="${post.image}" alt="${post.title}" class="w-full h-full object-cover min-h-[250px]">
                    </div>
                    <div class="p-8 md:w-2/3 flex flex-col justify-center">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="px-3 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full uppercase">${post.category}</span>
                            <span class="text-slate-400 text-xs">${post.date}</span>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-900 mb-4">${post.title}</h2>
                        <p class="text-slate-600 mb-6 leading-relaxed">${post.description}</p>
                        <div>
                            <a href="/index.html#contact" class="inline-flex items-center gap-2 bg-blue-700 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-800 transition">
                                Inquire Now <i class="fa-solid fa-arrow-right text-sm"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Run this as soon as the page opens
        window.onload = displayPosts;
    </script>
</body>
</html>
